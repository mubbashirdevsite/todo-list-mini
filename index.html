<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <!-- Header -->
        <header class="header">

            <h1>📝 To-Do List</h1>

            <p id="currentDate"></p>

        </header>

        <!-- Stats -->
        <section class="stats">

            <div>Total: <span id="totalTasks">0</span></div>
            <div>Completed: <span id="completedTasks">0</span></div>
            <div>Pending: <span id="pendingTasks">0</span></div>

        </section>

        <!-- Input -->
        <section class="input-box">

            <input type="text" id="taskInput" placeholder="Enter new task...">
            <button id="addBtn">Add</button>

        </section>

        <!-- Search -->
        <input type="text" id="searchInput" placeholder="Search tasks...">

        <!-- Filters -->
        <section class="filters">

            <button data-filter="all">All</button>
            <button data-filter="active">Active</button>
            <button data-filter="completed">Completed</button>

        </section>

        <!-- Clear -->
        <button id="clearCompleted">Clear Completed</button>

        <!-- Task List -->
        <ul id="taskList"></ul>

        <!-- Empty State -->
        <p id="emptyState">No tasks yet. Add your first task 🚀</p>

    </main>

    <script src="script.js"></script>

</body>

</html>
